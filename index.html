
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shinji</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
 
:root{
  --glass-bg: rgba(10,40,110,0.6);
  --glass-border: rgba(100,160,255,0.25);
}
 
html,body{
  width:100%;height:100%;
  overflow:hidden;
  font-family:'Rajdhani',sans-serif;
}
 
/* ── BACKGROUND IMAGE ── */
#bg{
  position:fixed;inset:0;z-index:0;
  background:url('background.jpeg') center center / cover no-repeat;
  transition:filter 0.8s ease;
}
#bg.blurred{
  filter:blur(14px) brightness(0.5);
}
/* fallback overlay always */
#bg::after{
  content:'';
  position:absolute;inset:0;
  background:rgba(0,10,40,0.45);
}
 
/* ── FLOATING PARTICLES ── */
.particle{
  position:fixed;
  width:2px;height:2px;
  background:rgba(100,180,255,0.6);
  border-radius:50%;
  animation:float-up linear infinite;
  pointer-events:none;
  z-index:1;
}
@keyframes float-up{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:0.5}
  100%{transform:translateY(-10vh) scale(1.5);opacity:0}
}
 
/* ── LOADING SCREEN ── */
#loader{
  position:fixed;inset:0;z-index:1000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#000814;
  transition:opacity 0.8s ease, visibility 0.8s ease;
}
#loader.fade-out{opacity:0;visibility:hidden;pointer-events:none}
 
.loader-title{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(1.5rem,4vw,2.8rem);
  color:#fff;
  letter-spacing:0.3em;
  margin-bottom:2.5rem;
  animation:pulse-glow 2s ease-in-out infinite;
}
@keyframes pulse-glow{
  0%,100%{text-shadow:0 0 20px rgba(100,160,255,0.5)}
  50%{text-shadow:0 0 40px rgba(100,160,255,1),0 0 60px rgba(100,160,255,0.4)}
}
 
.progress-container{
  width:min(380px,80vw);
  height:3px;
  background:rgba(255,255,255,0.08);
  border-radius:2px;
  overflow:hidden;
  margin-bottom:1rem;
  transition:opacity 0.4s;
}
.progress-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,#2244ff,#44aaff,#aaddff);
  border-radius:2px;
  transition:width 0.1s linear;
  box-shadow:0 0 12px rgba(100,180,255,0.9);
  position:relative;
}
.progress-bar::after{
  content:'';
  position:absolute;right:0;top:50%;
  transform:translateY(-50%);
  width:8px;height:8px;
  background:#fff;border-radius:50%;
  box-shadow:0 0 8px #fff,0 0 16px rgba(100,180,255,1);
}
.progress-label{
  font-size:0.75rem;
  color:rgba(150,200,255,0.7);
  letter-spacing:0.15em;
  text-transform:uppercase;
  margin-bottom:0.4rem;
  min-height:1.2em;
  transition:opacity 0.3s;
}
.progress-pct{
  font-size:0.7rem;
  color:rgba(100,150,255,0.5);
  letter-spacing:0.1em;
  transition:opacity 0.3s;
}
 
#enter-btn{
  display:none;
  padding:0.9rem 3rem;
  background:transparent;
  border:1px solid rgba(100,160,255,0.5);
  color:#fff;
  font-family:'Rajdhani',sans-serif;
  font-size:1rem;
  letter-spacing:0.3em;
  text-transform:uppercase;
  cursor:pointer;
  border-radius:4px;
  transition:all 0.3s;
  overflow:hidden;
  margin-top:0.5rem;
  position:relative;
}
#enter-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(100,160,255,0.15),transparent);
  transform:translateX(-100%);
  transition:transform 0.5s;
}
#enter-btn:hover{
  border-color:rgba(100,200,255,0.9);
  box-shadow:0 0 20px rgba(100,160,255,0.4),inset 0 0 20px rgba(100,160,255,0.05);
  letter-spacing:0.4em;
}
#enter-btn:hover::before{transform:translateX(100%)}
 
/* ── SCAN LINE ── */
.scan-line{
  position:fixed;top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(100,180,255,0.3),rgba(255,255,255,0.5),rgba(100,180,255,0.3),transparent);
  z-index:5;
  animation:scan 6s linear infinite;
  pointer-events:none;
}
@keyframes scan{
  0%{top:-2px;opacity:0}5%{opacity:1}95%{opacity:0.8}100%{top:100vh;opacity:0}
}
 
/* ── MAIN PAGE ── */
#main{
  position:fixed;inset:0;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 1.2s ease;
  padding:2rem;
}
#main.visible{opacity:1;pointer-events:all;}
 
/* flip wraps only the card scene so tagline doesn't flip */
#card-flip-wrap{
  transform-style:preserve-3d;
  transition:transform 1s cubic-bezier(0.6,0,0.4,1);
  transform-origin:center center;
}
#card-flip-wrap.flipped{
  transform:rotateX(180deg);
}
 
/* ── CARD SCENE ── */
.card-scene{
  perspective:1200px;
  position:relative;
}
.card-wrapper{
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.12s ease-out;
  will-change:transform;
}
 
/* ── BANNER ── */
.banner{
  width:520px;height:150px;
  border-radius:18px 18px 0 0;
  background:url('banner.jpeg') center center / cover no-repeat;
  border:1px solid var(--glass-border);
  border-bottom:none;
  position:relative;overflow:hidden;
}
.banner::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(45deg,transparent 0px,transparent 24px,rgba(80,120,255,0.04) 24px,rgba(80,120,255,0.04) 25px),
    repeating-linear-gradient(-45deg,transparent 0px,transparent 24px,rgba(80,120,255,0.04) 24px,rgba(80,120,255,0.04) 25px);
}
.banner::after{
  content:'';position:absolute;
  bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(100,160,255,0.6),rgba(255,255,255,0.3),rgba(100,160,255,0.6),transparent);
}
.banner-noise{
  position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.5;pointer-events:none;
}
.banner-reflection,.card-reflection{
  position:absolute;inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,0.08) 0%,transparent 60%);
  pointer-events:none;border-radius:inherit;
}
 
/* ── PFP ── */
.pfp-wrapper{
  position:absolute;
  left:28px;top:-44px;
  z-index:10;
}
.pfp-ring{
  width:88px;height:88px;
  border-radius:50%;
  padding:3px;
  background:linear-gradient(135deg,#ff2244,#ffffff,#4488ff,#ffffff,#ff2244);
  background-size:300% 300%;
  animation:ring-spin 4s linear infinite;
  box-shadow:0 0 20px rgba(255,34,68,0.5),0 0 40px rgba(68,136,255,0.3);
}
@keyframes ring-spin{
  0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
}
.pfp-img{
  width:100%;height:100%;
  border-radius:50%;
  object-fit:cover;display:block;
}
.pfp-placeholder{
  width:100%;height:100%;
  border-radius:50%;
  background:linear-gradient(135deg,#1a2a6e,#2a1060);
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;color:rgba(200,220,255,0.8);
  font-family:'Cinzel Decorative',cursive;font-weight:700;
}
 
/* ── GLASS CARD ── */
.glass-card{
  width:520px;min-height:280px;
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-top:none;
  border-radius:0 0 22px 22px;
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  padding:3.5rem 1.8rem 1.6rem;
  position:relative;overflow:visible;
}
.glass-card::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 20% 20%,rgba(100,160,255,0.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 80%,rgba(60,100,200,0.06) 0%,transparent 60%);
  pointer-events:none;border-radius:0 0 22px 22px;
}
.glass-card::after{
  content:'';position:absolute;
  top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
}
.card-shine{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,transparent 50%,rgba(255,255,255,0.02) 100%);
  pointer-events:none;border-radius:0 0 22px 22px;
}
 
/* ── CORNER DECORATIONS ── */
.corner-deco{
  position:absolute;width:12px;height:12px;
  border-color:rgba(100,160,255,0.4);border-style:solid;
}
.corner-deco.tl{top:8px;left:8px;border-width:1px 0 0 1px}
.corner-deco.tr{top:8px;right:8px;border-width:1px 1px 0 0}
.corner-deco.bl{bottom:8px;left:8px;border-width:0 0 1px 1px}
.corner-deco.br{bottom:8px;right:8px;border-width:0 1px 1px 0}
 
/* ── CARD CONTENT ── */
.card-body{
  display:flex;flex-direction:column;
  align-items:flex-start;text-align:left;
}
.info-section{width:100%}
 
.alias{
  font-family:'Cinzel Decorative',cursive;
  font-size:1.9rem;font-weight:700;
  letter-spacing:0.08em;line-height:1;
  background:linear-gradient(90deg,#ff2244 0%,#ff6688 30%,#ffffff 50%,#ff6688 70%,#ff2244 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer-red 3s linear infinite;
  filter:drop-shadow(0 0 8px rgba(255,34,68,0.6));
  margin-bottom:0.5rem;
}
@keyframes shimmer-red{
  0%{background-position:0% center}100%{background-position:200% center}
}
 
.description{
  font-size:0.78rem;
  color:rgba(180,210,255,0.7);
  letter-spacing:0.05em;
  margin-bottom:1.4rem;
  font-weight:300;line-height:1.5;
}
.divider{
  width:100%;height:1px;
  background:linear-gradient(90deg,rgba(100,160,255,0.4),rgba(255,255,255,0.15),transparent);
  margin-bottom:1.2rem;
}
.socials-label{
  font-size:0.6rem;letter-spacing:0.2em;
  text-transform:uppercase;
  color:rgba(100,150,255,0.5);
  margin-bottom:0.7rem;text-align:left;
}
.socials-grid{
  display:flex;flex-wrap:wrap;gap:0.5rem;
  justify-content:flex-start;
}
.social-btn{
  display:flex;align-items:center;justify-content:center;
  width:40px;height:40px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(100,160,255,0.2);
  border-radius:10px;
  color:rgba(200,220,255,0.85);
  cursor:pointer;text-decoration:none;
  transition:all 0.25s;position:relative;overflow:hidden;
}
.social-btn svg{width:20px;height:20px;fill:currentColor;flex-shrink:0}
.social-btn:hover{background:rgba(100,160,255,0.12);border-color:rgba(100,200,255,0.5);color:#fff;box-shadow:0 0 12px rgba(100,160,255,0.25);transform:translateY(-1px)}
.social-btn.instagram:hover{background:rgba(200,80,150,0.15);border-color:rgba(220,100,170,0.5);box-shadow:0 0 12px rgba(200,80,150,0.3)}
.social-btn.telegram:hover{background:rgba(40,160,220,0.15);border-color:rgba(40,180,240,0.5);box-shadow:0 0 12px rgba(40,160,220,0.3)}
.social-btn.discord:hover{background:rgba(88,101,242,0.2);border-color:rgba(88,101,242,0.6);box-shadow:0 0 12px rgba(88,101,242,0.35)}
 
/* ── SEE MORE BUTTON ── */
.see-more-btn{
  margin-top:1.2rem;
  padding:0.45rem 1.4rem;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(100,160,255,0.25);
  border-radius:8px;
  color:rgba(180,210,255,0.7);
  font-family:'Rajdhani',sans-serif;
  font-size:0.75rem;letter-spacing:0.2em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.25s;
  backdrop-filter:blur(4px);
}
.see-more-btn:hover{
  border-color:rgba(100,200,255,0.5);
  color:#fff;
  box-shadow:0 0 12px rgba(100,160,255,0.2);
}
 
/* ── MUSIC BAR ── */
.music-bar{
  position:absolute;bottom:1.2rem;right:1.4rem;
  display:flex;align-items:flex-end;gap:3px;height:18px;
  opacity:0;transition:opacity 0.5s;
}
.music-bar.playing{opacity:0.6}
.music-bar span{
  display:block;width:3px;
  background:rgba(100,180,255,0.8);border-radius:2px;
  animation:eq 1.2s ease-in-out infinite;
}
.music-bar span:nth-child(1){height:8px;animation-delay:0s}
.music-bar span:nth-child(2){height:14px;animation-delay:0.2s}
.music-bar span:nth-child(3){height:10px;animation-delay:0.4s}
.music-bar span:nth-child(4){height:16px;animation-delay:0.1s}
.music-bar span:nth-child(5){height:6px;animation-delay:0.3s}
@keyframes eq{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.2)}}
 
/* ── TAGLINE ── */
.tagline{
  margin-top:1.5rem;font-size:0.65rem;
  letter-spacing:0.25em;color:rgba(100,140,255,0.35);
  text-transform:uppercase;text-align:center;
}
 
/* ── CLICK RIPPLE ── */
@keyframes ripple{0%{transform:scale(0);opacity:0.4}100%{transform:scale(4);opacity:0}}
.ripple-el{
  position:absolute;width:80px;height:80px;border-radius:50%;
  background:rgba(100,180,255,0.3);transform:scale(0);
  animation:ripple 0.6s ease-out forwards;pointer-events:none;
}
 
/* ── AUDIO TOGGLE ── */
#audio-toggle{
  position:fixed;bottom:1.5rem;right:1.5rem;
  z-index:100;width:38px;height:38px;border-radius:50%;
  background:rgba(10,40,110,0.6);
  border:1px solid rgba(100,160,255,0.3);
  backdrop-filter:blur(10px);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:rgba(180,210,255,0.7);font-size:0.9rem;
  transition:all 0.3s;opacity:0;
}
#audio-toggle.visible{opacity:1}
#audio-toggle:hover{border-color:rgba(100,200,255,0.6);color:#fff;box-shadow:0 0 16px rgba(100,160,255,0.3)}
 
/* ══════════════════════════════════════
   SEE MORE SCENE
══════════════════════════════════════ */
 
#more-overlay{
  position:fixed;inset:0;z-index:10;
  background:rgba(0,5,25,0.65);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  opacity:0;pointer-events:none;
  transition:opacity 0.7s ease;
}
#more-overlay.active{opacity:1;pointer-events:all}
 
/* close button top-right */
#more-close-btn{
  position:fixed;top:1.4rem;right:1.4rem;
  z-index:50;
  width:32px;height:32px;
  background:rgba(6,18,52,0.7);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;
  color:rgba(180,210,255,0.5);
  font-size:0.85rem;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
  opacity:0;pointer-events:none;
  backdrop-filter:blur(8px);
}
#more-close-btn.visible{opacity:1;pointer-events:all}
#more-close-btn:hover{border-color:rgba(255,100,100,0.4);color:rgba(255,130,130,0.9)}
 
/* shinji floating image - center */
#shinji-float{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:30;
  width:220px;
  opacity:0;
  filter:drop-shadow(0 0 30px rgba(100,160,255,0.35)) drop-shadow(0 0 60px rgba(100,100,255,0.15));
  transition:opacity 0.8s ease;
  pointer-events:none;
  animation:shinji-bob 4s ease-in-out infinite;
  animation-play-state:paused;
}
#shinji-float.visible{
  opacity:1;
  pointer-events:none;
  animation-play-state:running;
}
@keyframes shinji-bob{
  0%  {transform:translate(-50%,-50%) translateY(0px)   rotateX(0deg)   rotateY(0deg)}
  25% {transform:translate(-50%,-50%) translateY(-12px)  rotateX(3deg)   rotateY(2deg)}
  50% {transform:translate(-50%,-50%) translateY(-6px)   rotateX(-1deg)  rotateY(-3deg)}
  75% {transform:translate(-50%,-50%) translateY(-14px)  rotateX(2deg)   rotateY(1deg)}
  100%{transform:translate(-50%,-50%) translateY(0px)   rotateX(0deg)   rotateY(0deg)}
}
 
/* info cards scattered around shinji */
.scatter-card{
  position:fixed;
  z-index:30;
  width:180px;
  background:rgba(6,16,48,0.78);
  border:1px solid rgba(100,160,255,0.15);
  border-radius:14px;
  padding:1rem 1.1rem;
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.6s ease, transform 0.6s cubic-bezier(0.22,1,0.36,1), border-color 0.2s;
  transform:scale(0.85);
}
.scatter-card::after{
  content:'';position:absolute;
  top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
}
.scatter-card.visible{
  opacity:1;
  pointer-events:all;
  transform:scale(1);
}
.scatter-card:hover{
  border-color:rgba(100,160,255,0.3);
  background:rgba(10,24,70,0.85);
}
 
/* left column: MC top, Discord bottom */
#sc-mc{
  left:calc(50% - 340px);
  top:calc(50% - 130px);
  transition-delay:0s;
}
#sc-steam{
  left:calc(50% - 340px);
  top:calc(50% + 30px);
  transition-delay:0.1s;
}
/* right: steam */
#sc-discord{
  left:calc(50% + 160px);
  top:calc(50% - 50px);
  transition-delay:0.05s;
}
 
.sc-label{
  font-size:0.52rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:rgba(100,140,255,0.45);
  margin-bottom:0.6rem;
}
.sc-icon-row{
  display:flex;align-items:center;gap:0.6rem;
  margin-bottom:0.5rem;
}
.sc-icon{
  width:30px;height:30px;flex-shrink:0;
  border-radius:7px;
  display:flex;align-items:center;justify-content:center;
}
.sc-icon.mc{background:rgba(80,200,80,0.1);border:1px solid rgba(80,200,80,0.15)}
.sc-icon.dc{background:rgba(88,101,242,0.12);border:1px solid rgba(88,101,242,0.18)}
.sc-icon.steam{background:rgba(160,180,255,0.07);border:1px solid rgba(160,180,255,0.12)}
 
.sc-title{
  font-size:0.78rem;font-weight:600;
  color:rgba(215,230,255,0.88);
  letter-spacing:0.03em;
  line-height:1.2;
}
.sc-sub{
  font-size:0.62rem;font-weight:300;
  color:rgba(130,165,255,0.45);
  letter-spacing:0.04em;
  margin-top:2px;
}
.sc-copy{
  margin-top:0.65rem;
  width:100%;
  padding:0.28rem 0;
  background:transparent;
  border:1px solid rgba(100,160,255,0.15);
  border-radius:6px;
  color:rgba(140,180,255,0.5);
  font-family:'Rajdhani',sans-serif;
  font-size:0.6rem;letter-spacing:0.12em;
  cursor:pointer;transition:all 0.2s;
  text-transform:uppercase;
  text-align:center;
}
.sc-copy:hover{border-color:rgba(100,200,255,0.35);color:rgba(180,220,255,0.9)}
.sc-copy.copied{border-color:rgba(60,220,120,0.4);color:rgba(60,220,120,0.8)}
.sc-link{
  display:block;
  margin-top:0.65rem;
  width:100%;
  padding:0.28rem 0;
  background:transparent;
  border:1px solid rgba(100,160,255,0.15);
  border-radius:6px;
  color:rgba(140,180,255,0.5);
  font-family:'Rajdhani',sans-serif;
  font-size:0.6rem;letter-spacing:0.12em;
  cursor:pointer;transition:all 0.2s;
  text-transform:uppercase;
  text-align:center;
  text-decoration:none;
}
.sc-link:hover{border-color:rgba(100,200,255,0.35);color:rgba(180,220,255,0.9)}
 
/* ── WELCOME TEXT ── */

<script>
/* ── PARTICLES ── */
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<25;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'vw';
    p.style.width=p.style.height=(Math.random()*3+1)+'px';
    p.style.animationDuration=(Math.random()*20+15)+'s';
    p.style.animationDelay=-(Math.random()*20)+'s';
    p.style.opacity=Math.random()*0.6+0.2;
    c.appendChild(p);
  }
})();
 
/* ── LOADER ── */
const resources=[
  {label:'Loading background...', pct:8},
  {label:'Fetching pfp.png...', pct:22},
  {label:'Buffering music.mp3...', pct:44},
  {label:'Rendering glass...', pct:62},
  {label:'Charging particles...', pct:78},
  {label:'Calibrating tilt engine...', pct:91},
  {label:'Almost there...', pct:99},
];
const bar=document.getElementById('prog-bar');
const lbl=document.getElementById('prog-label');
const pct=document.getElementById('prog-pct');
const enterBtn=document.getElementById('enter-btn');
let si=0;
function nextStep(){
  if(si>=resources.length){
    bar.style.width='100%';pct.textContent='100%';lbl.textContent='Ready.';
    setTimeout(()=>{
      lbl.style.opacity='0';pct.style.opacity='0';
      setTimeout(()=>{
        document.querySelector('.progress-container').style.opacity='0';
        enterBtn.style.display='block';enterBtn.style.opacity='0';
        setTimeout(()=>{enterBtn.style.transition='opacity 0.8s';enterBtn.style.opacity='1';},50);
      },400);
    },300);
    return;
  }
  const r=resources[si++];
  bar.style.width=r.pct+'%';lbl.textContent=r.label;pct.textContent=r.pct+'%';
  setTimeout(nextStep,200+Math.random()*350);
}
setTimeout(nextStep,600);
 
/* ── AUDIO ── */
const audio=document.getElementById('bg-music');
let musicPlaying=false;
const toggle=document.getElementById('audio-toggle');
const musicBar=document.getElementById('musicBar');
 
function enterSite(){
  audio.play().then(()=>{
    musicPlaying=true;toggle.textContent='♪';musicBar.classList.add('playing');
  }).catch(()=>{});
  document.getElementById('loader').classList.add('fade-out');
  setTimeout(()=>{
    document.getElementById('main').classList.add('visible');
    toggle.classList.add('visible');
  },500);
}
window.enterSite=enterSite;
 
toggle.addEventListener('click',()=>{
  if(musicPlaying){
    audio.pause();musicPlaying=false;toggle.textContent='♩';musicBar.classList.remove('playing');
  } else {
    audio.play();musicPlaying=true;toggle.textContent='♪';musicBar.classList.add('playing');
  }
});
 
/* ── 3D TILT ── */
const wrapper=document.getElementById('cardWrapper');
const cardReflect=document.getElementById('cardReflect');
const bannerReflect=document.getElementById('bannerReflect');
let rafId=null,currentRX=0,currentRY=0,targetRX=0,targetRY=0;
 
wrapper.addEventListener('mousemove',(e)=>{
  const rect=wrapper.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  targetRY=((e.clientX-cx)/(rect.width/2))*18;
  targetRX=-((e.clientY-cy)/(rect.height/2))*12;
  const mx=((e.clientX-rect.left)/rect.width*100).toFixed(1);
  const my=((e.clientY-rect.top)/rect.height*100).toFixed(1);
  cardReflect.style.setProperty('--mx',mx+'%');
  cardReflect.style.setProperty('--my',my+'%');
  bannerReflect.style.setProperty('--mx',mx+'%');
  bannerReflect.style.setProperty('--my',my+'%');
  if(!rafId)animateTilt();
});
wrapper.addEventListener('mouseleave',()=>{targetRX=0;targetRY=0;if(!rafId)animateTilt();});
function animateTilt(){
  currentRX+=(targetRX-currentRX)*0.12;
  currentRY+=(targetRY-currentRY)*0.12;
  wrapper.style.transform=`rotateX(${currentRX}deg) rotateY(${currentRY}deg)`;
  if(Math.abs(currentRX-targetRX)>0.02||Math.abs(currentRY-targetRY)>0.02){
    rafId=requestAnimationFrame(animateTilt);
  } else {
    currentRX=targetRX;currentRY=targetRY;
    wrapper.style.transform=`rotateX(${currentRX}deg) rotateY(${currentRY}deg)`;
    rafId=null;
  }
}
 
/* ── RIPPLE ── */
document.getElementById('glassCard').addEventListener('click',(e)=>{
  const rect=e.currentTarget.getBoundingClientRect();
  const r=document.createElement('div');r.className='ripple-el';
  r.style.left=(e.clientX-rect.left-40)+'px';r.style.top=(e.clientY-rect.top-40)+'px';
  e.currentTarget.appendChild(r);setTimeout(()=>r.remove(),700);
});
 
/* ── SEE MORE / FLIP ── */
let moreOpen=false;
function openMore(){
  if(moreOpen)return;moreOpen=true;
  // 1. flip the card
  document.getElementById('card-flip-wrap').classList.add('flipped');
  // 2. after flip, blur bg + overlay
  setTimeout(()=>{
    document.getElementById('bg').classList.add('blurred');
    document.getElementById('more-overlay').classList.add('active');
  },900);
  // 3. after 2s: show shinji float + close btn + welcome text
  setTimeout(()=>{
    document.getElementById('shinji-float').classList.add('visible');
    document.getElementById('more-close-btn').classList.add('visible');
    document.getElementById('welcome-text').classList.add('visible');
  },2000);
  // 4. stagger the 3 cards in shortly after
  setTimeout(()=>{ document.getElementById('sc-mc').classList.add('visible'); },2200);
  setTimeout(()=>{ document.getElementById('sc-steam').classList.add('visible'); },2350);
  setTimeout(()=>{ document.getElementById('sc-discord').classList.add('visible'); },2500);
}
function closeMore(){
  if(!moreOpen)return;moreOpen=false;
  // hide cards + shinji
  ['sc-mc','sc-steam','sc-discord','shinji-float','more-close-btn','welcome-text'].forEach(id=>{
    document.getElementById(id).classList.remove('visible');
  });
  setTimeout(()=>{
    document.getElementById('more-overlay').classList.remove('active');
    document.getElementById('bg').classList.remove('blurred');
    document.getElementById('card-flip-wrap').classList.remove('flipped');
  },400);
}
window.openMore=openMore;window.closeMore=closeMore;
 
/* ── COPY ── */
function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btn.textContent;
    btn.textContent='✓ Copied';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied');},2000);
  });
}
window.copyText=copyText;
</script>
