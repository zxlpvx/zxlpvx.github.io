<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zxlpvx</title>
    <link rel="icon" type="image/png" href="pfp.png" id="favicon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #000000, #0f0f0f);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .pfp {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .pfp:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 28px;
            margin: 0 0 30px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px auto;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            text-decoration: none;
            color: #ffffff;
            font-size: 18px;
            font-weight: 500;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            max-width: 300px;
            cursor: pointer;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .button:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .button:hover::before {
            left: 100%;
        }

        .button i {
            margin-right: 12px;
            font-size: 20px;
        }

        .button .text {
            transition: opacity 0.3s ease;
        }

        .button .check {
            position: absolute;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .session-button {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ffcdd2;
            font-weight: 600;
        }

        .session-button:hover {
            background: rgba(220, 38, 38, 0.25);
            box-shadow: 0 8px 25px rgba(220, 38, 38, 0.2);
            transform: translateY(-4px);
        }

        .session-button::before {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
        }

        .session-button .check {
            color: #fff;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particles span {
            position: absolute;
            display: block;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 15s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            50% { transform: translateY(-100vh) rotate(720deg); opacity: 0.5; }
            100% { transform: translateY(-200vh) rotate(1440deg); opacity: 0; }
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 15px;
            }
            .pfp {
                width: 120px;
                height: 120px;
            }
            h1 {
                font-size: 24px;
            }
            .button {
                padding: 12px 25px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="particles">
        <span style="left: 10%; animation-delay: 0s;"></span>
        <span style="left: 20%; animation-delay: 2s;"></span>
        <span style="left: 30%; animation-delay: 4s;"></span>
        <span style="left: 40%; animation-delay: 6s;"></span>
        <span style="left: 50%; animation-delay: 8s;"></span>
        <span style="left: 60%; animation-delay: 10s;"></span>
        <span style="left: 70%; animation-delay: 12s;"></span>
        <span style="left: 80%; animation-delay: 14s;"></span>
        <span style="left: 90%; animation-delay: 16s;"></span>
    </div>
    <div class="container">
        <img src="pfp.png" alt="zxlpvx Profile Picture" class="pfp">
        <h1>sloppy</h1>
        <a href="https://www.instagram.com/zxlpvx" target="_blank" rel="noopener noreferrer" class="button"><i class="fab fa-instagram"></i> Instagram</a>
        <a href="https://t.me/zxlpvx" target="_blank" rel="noopener noreferrer" class="button"><i class="fab fa-telegram-plane"></i> Telegram</a>
        <div onclick="copyDiscord(this)" class="button">
            <i class="fab fa-discord"></i>
            <span class="text">Discord</span>
            <i class="fas fa-check check"></i>
        </div>
        <a href="mailto:zxlpvx@proton.me" class="button"><i class="fas fa-envelope"></i> Email</a>
        
        <div onclick="copySession(this)" class="button session-button">
            <i class="fas fa-user-secret"></i>
            <span class="text">session</span>
            <i class="fas fa-check check"></i>
        </div>
    </div>

    <script>

        function copyDiscord(button) {
            navigator.clipboard.writeText('zxlpvx').then(() => {
                const text = button.querySelector('.text');
                const check = button.querySelector('.check');
                text.style.opacity = '0';
                check.style.opacity = '1';
                setTimeout(() => {
                    text.style.opacity = '1';
                    check.style.opacity = '0';
                }, 2000);
            }).catch(err => console.error('Failed to copy: ', err));
        }

        function copySession(button) {
            navigator.clipboard.writeText('056e057b68b9aa8f987f72f5e19a8214991b429d02914c27002328b71e3431e369').then(() => {
                const text = button.querySelector('.text');
                const check = button.querySelector('.check');
                text.style.opacity = '0';
                check.style.opacity = '1';
                setTimeout(() => {
                    text.style.opacity = '1';
                    check.style.opacity = '0';
                }, 2000);
            }).catch(err => console.error('Failed to copy: ', err));
        }


        document.addEventListener("DOMContentLoaded", function() {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = "pfp.png?" + new Date().getTime();

            img.onload = function() {
                const size = 64;
                const canvas = document.createElement("canvas");
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext("2d");

                ctx.clearRect(0, 0, size, size);


                ctx.beginPath();
                ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
                ctx.clip();


                ctx.drawImage(img, 0, 0, size, size);


                const link = document.getElementById("favicon");
                if (link) {
                    link.href = canvas.toDataURL("image/png");

                    const link32 = document.createElement("link");
                    link32.rel = "icon";
                    link32.type = "image/png";
                    link32.sizes = "32x32";
                    link32.href = canvas.toDataURL("image/png");
                    document.head.appendChild(link32);
                }
            };


            img.onerror = function() {
                console.warn("Could not load pfp.png for circular favicon");
            };
        });
    </script>
</body>
</html>
